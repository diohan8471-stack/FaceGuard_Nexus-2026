services:
  - type: web
    name: faceguard-nexus
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PRODUCTION
        value: "true"
      - key: DB_PATH
        value: /opt/render/project/src/nexus.db
    disk:
      name: nexus-data
      mountPath: /opt/render/project/src
      sizeGB: 1
